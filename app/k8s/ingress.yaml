apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: apps
spec:
  ingressClassName: nginx
  rules:
    - host: app.eks-ministack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
