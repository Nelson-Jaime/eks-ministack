name: Infra CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "helm/**"
      - "k8s/**"
      - "kind-config.yaml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "helm/**"
      - "k8s/**"
      - "kind-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_HOST: unix:///run/user/1000/docker.sock
  KUBECONFIG: /home/nelson/.kube/config-eks-ministack
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566

jobs:

  # ── Validate: runs on every PR and every push to main ─────────────────────
  validate:
    name: Validate IaC + YAML
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Terraform init (provider cache, skip S3 backend)
        working-directory: terraform
        run: terraform init -backend=false
        env:
          TF_PLUGIN_CACHE_DIR: /home/nelson/.terraform.d/plugin-cache

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Checkov IaC scan
        run: |
          checkov \
            -d terraform/ \
            --framework terraform \
            --config-file terraform/.checkov.yaml \
            --quiet \
            --compact

      - name: Install yamllint
        run: command -v yamllint &>/dev/null || pip3 install --user --quiet yamllint

      - name: Lint helm + k8s manifests
        run: |
          yamllint \
            --config-data '{
              extends: default,
              rules: {
                line-length: {max: 160, level: warning},
                truthy: {allowed-values: ["true","false"], check-keys: false}
              }
            }' \
            helm/ k8s/ kind-config.yaml

  # ── Apply: push to main only (i.e. after PR is approved and merged) ───────
  apply:
    name: Apply Terraform
    runs-on: [self-hosted, linux, arm64]
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Terraform apply
        # helm/ and k8s/ changes don't need an explicit step here —
        # ArgoCD (selfHeal: true) picks them up automatically within ~3 minutes of push
        run: make tf-apply
